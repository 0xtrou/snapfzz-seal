name: E2E Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Verify binaries exist
        run: |
          ls -la target/release/seal
          ls -la target/release/seal-launcher

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/seal
            target/release/seal-launcher
          if-no-files-found: error
          retention-days: 1

  e2e-pyinstaller:
    name: E2E - PyInstaller
    runs-on: ubuntu-latest
    needs: build-binaries
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries

      - name: Prepare binaries
        run: |
          mkdir -p target/release
          cp binaries/seal target/release/
          cp binaries/seal-launcher target/release/
          chmod +x target/release/seal target/release/seal-launcher

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: E2E Pipeline
        env:
          SNAPFZZ_SEAL_API_KEY: ${{ secrets.SNAPFZZ_SEAL_API_KEY }}
          SNAPFZZ_SEAL_API_BASE: ${{ secrets.SNAPFZZ_SEAL_API_BASE }}
          SNAPFZZ_SEAL_MODEL: ${{ secrets.SNAPFZZ_SEAL_MODEL }}
          SNAPFZZ_SEAL_MASTER_SECRET_HEX: ${{ secrets.SNAPFZZ_SEAL_MASTER_SECRET_HEX }}
        run: |
          echo "=== PyInstaller Backend E2E Test ==="
          
          USER_FP=$(echo -n "pyinstaller-user-$(date +%s)" | sha256sum | cut -d' ' -f1)
          SANDBOX_FP=$(echo -n "pyinstaller-sandbox-$(date +%s)" | sha256sum | cut -d' ' -f1)
          
          echo "User FP: $USER_FP"
          echo "Sandbox FP: $SANDBOX_FP"
          
          # Generate keys
          ./target/release/seal keygen --keys-dir /tmp/keys-pyinstaller
          
          # Compile
          ./target/release/seal compile \
            --project ./examples/chat_agent \
            --user-fingerprint "$USER_FP" \
            --sandbox-fingerprint "$SANDBOX_FP" \
            --output /tmp/agent-pyinstaller.sealed \
            --launcher ./target/release/seal-launcher \
            --backend pyinstaller \
            --mode batch
          
          # Sign
          ./target/release/seal sign \
            --key /tmp/keys-pyinstaller/builder_secret.key \
            --binary /tmp/agent-pyinstaller.sealed
          
          # Verify
          ./target/release/seal verify \
            --binary /tmp/agent-pyinstaller.sealed \
            --pubkey /tmp/keys-pyinstaller/builder_public.key
          
          # Launch
          export AGENT_PROMPT="What is 2+3? Answer in one word."
          chmod +x /tmp/agent-pyinstaller.sealed
          timeout 30 /tmp/agent-pyinstaller.sealed --user-fingerprint "$USER_FP" || true
          
          echo "✓ PyInstaller E2E complete"

  e2e-nuitka:
    name: E2E - Nuitka
    runs-on: ubuntu-latest
    needs: build-binaries
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries

      - name: Prepare binaries
        run: |
          mkdir -p target/release
          cp binaries/seal target/release/
          cp binaries/seal-launcher target/release/
          chmod +x target/release/seal target/release/seal-launcher

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nuitka
        run: pip install nuitka ordered-set zstandard

      - name: Install system dependencies for Nuitka
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: E2E Pipeline
        env:
          SNAPFZZ_SEAL_API_KEY: ${{ secrets.SNAPFZZ_SEAL_API_KEY }}
          SNAPFZZ_SEAL_API_BASE: ${{ secrets.SNAPFZZ_SEAL_API_BASE }}
          SNAPFZZ_SEAL_MODEL: ${{ secrets.SNAPFZZ_SEAL_MODEL }}
          SNAPFZZ_SEAL_MASTER_SECRET_HEX: ${{ secrets.SNAPFZZ_SEAL_MASTER_SECRET_HEX }}
        run: |
          echo "=== Nuitka Backend E2E Test ==="
          
          USER_FP=$(echo -n "nuitka-user-$(date +%s)" | sha256sum | cut -d' ' -f1)
          SANDBOX_FP=$(echo -n "nuitka-sandbox-$(date +%s)" | sha256sum | cut -d' ' -f1)
          
          echo "User FP: $USER_FP"
          echo "Sandbox FP: $SANDBOX_FP"
          
          # Generate keys
          ./target/release/seal keygen --keys-dir /tmp/keys-nuitka
          
          # Compile
          ./target/release/seal compile \
            --project ./examples/chat_agent \
            --user-fingerprint "$USER_FP" \
            --sandbox-fingerprint "$SANDBOX_FP" \
            --output /tmp/agent-nuitka.sealed \
            --launcher ./target/release/seal-launcher \
            --backend nuitka \
            --mode batch
          
          # Sign
          ./target/release/seal sign \
            --key /tmp/keys-nuitka/builder_secret.key \
            --binary /tmp/agent-nuitka.sealed
          
          # Verify
          ./target/release/seal verify \
            --binary /tmp/agent-nuitka.sealed \
            --pubkey /tmp/keys-nuitka/builder_public.key
          
          # Launch
          export AGENT_PROMPT="What is 4+5? Answer in one word."
          chmod +x /tmp/agent-nuitka.sealed
          timeout 30 /tmp/agent-nuitka.sealed --user-fingerprint "$USER_FP" || true
          
          echo "✓ Nuitka E2E complete"

  e2e-golang:
    name: E2E - Go
    runs-on: ubuntu-latest
    needs: build-binaries
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries

      - name: Prepare binaries
        run: |
          mkdir -p target/release
          cp binaries/seal target/release/
          cp binaries/seal-launcher target/release/
          chmod +x target/release/seal target/release/seal-launcher

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: E2E Pipeline
        env:
          SNAPFZZ_SEAL_API_KEY: ${{ secrets.SNAPFZZ_SEAL_API_KEY }}
          SNAPFZZ_SEAL_API_BASE: ${{ secrets.SNAPFZZ_SEAL_API_BASE }}
          SNAPFZZ_SEAL_MODEL: ${{ secrets.SNAPFZZ_SEAL_MODEL }}
          SNAPFZZ_SEAL_MASTER_SECRET_HEX: ${{ secrets.SNAPFZZ_SEAL_MASTER_SECRET_HEX }}
        run: |
          echo "=== Go Backend E2E Test ==="
          
          USER_FP=$(echo -n "go-user-$(date +%s)" | sha256sum | cut -d' ' -f1)
          SANDBOX_FP=$(echo -n "go-sandbox-$(date +%s)" | sha256sum | cut -d' ' -f1)
          
          echo "User FP: $USER_FP"
          echo "Sandbox FP: $SANDBOX_FP"
          
          # Generate keys
          ./target/release/seal keygen --keys-dir /tmp/keys-go
          
          # Compile
          ./target/release/seal compile \
            --project ./examples/go_agent \
            --user-fingerprint "$USER_FP" \
            --sandbox-fingerprint "$SANDBOX_FP" \
            --output /tmp/agent-go.sealed \
            --launcher ./target/release/seal-launcher \
            --mode batch
          
          # Sign
          ./target/release/seal sign \
            --key /tmp/keys-go/builder_secret.key \
            --binary /tmp/agent-go.sealed
          
          # Verify
          ./target/release/seal verify \
            --binary /tmp/agent-go.sealed \
            --pubkey /tmp/keys-go/builder_public.key
          
          # Launch
          export AGENT_PROMPT="What is 6+7? Answer in one word."
          chmod +x /tmp/agent-go.sealed
          timeout 30 /tmp/agent-go.sealed --user-fingerprint "$USER_FP" || true
          
          echo "✓ Go E2E complete"

  upload-artifacts:
    name: Upload Artifacts
    runs-on: ubuntu-latest
    needs: [e2e-pyinstaller, e2e-nuitka, e2e-golang]
    if: always()
    
    steps:
      - name: Upload sealed binaries
        uses: actions/upload-artifact@v4
        with:
          name: sealed-agents
          path: /tmp/agent-*.sealed
          if-no-files-found: ignore
          retention-days: 7
