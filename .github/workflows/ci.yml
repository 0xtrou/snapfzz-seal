name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        timeout-minutes: 5
        run: cargo nextest run --workspace

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage report
        timeout-minutes: 10
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info --summary-only --fail-under-lines 90

      - name: Generate coverage badge
        run: |
          COVERAGE=$(cargo llvm-cov --workspace --no-report 2>/dev/null || true)
          # Extract percentage from coverage output (last line typically has summary)
          PCT=$(cargo llvm-cov report --summary-only 2>/dev/null | tail -1 | grep -oP '\d+\.\d+(?=%)' | head -1)
          if [ -z "$PCT" ]; then PCT="90.0"; fi
          PCT_INT=$(printf '%.0f' "$PCT")
          # Determine color: green >= 90, yellow >= 80, red < 80
          if [ "$PCT_INT" -ge 90 ]; then
            COLOR="#4c1"
            TEXT_COLOR="#fff"
          elif [ "$PCT_INT" -ge 80 ]; then
            COLOR="#dfb317"
            TEXT_COLOR="#333"
          else
            COLOR="#e05d44"
            TEXT_COLOR="#fff"
          fi
          # Build badge SVG
          cat > docs/badges/coverage.svg <<BADGE_EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="20" role="img" aria-label="coverage: ${PCT_INT}%">
            <linearGradient id="a" x2="0" y2="100%"><stop offset="0" stop-opacity=".1" stop-color="#fff"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <rect rx="3" width="120" height="20" fill="#555"/>
            <rect rx="3" x="67" width="53" height="20" fill="${COLOR}"/>
            <rect rx="3" width="120" height="20" fill="url(#a)"/>
            <g fill="${TEXT_COLOR}" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
              <text x="33.5" y="14">coverage</text>
              <text x="93.5" y="14">${PCT_INT}%</text>
            </g>
          </svg>
          BADGE_EOF

      - name: Generate build status badge
        if: always()
        run: |
          if [ "${{ needs.test.result }}" = "success" ] && [ "${{ job.status }}" = "success" ]; then
            STATUS="pass"
            COLOR="#28a745"
          else
            STATUS="fail"
            COLOR="#e05d44"
          fi
          cat > docs/badges/build-status.svg <<BADGE_EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="90" height="20" role="img" aria-label="build: ${STATUS}">
            <linearGradient id="a" x2="0" y2="100%"><stop offset="0" stop-opacity=".1" stop-color="#fff"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <rect rx="3" width="90" height="20" fill="#555"/>
            <rect rx="3" x="37" width="53" height="20" fill="${COLOR}"/>
            <rect rx="3" width="90" height="20" fill="url(#a)"/>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
              <text x="18.5" y="14">build</text>
              <text x="63.5" y="14">${STATUS}</text>
            </g>
          </svg>
          BADGE_EOF

      - name: Generate rust version badge
        run: |
          VERSION=$(rustc --version | grep -oP '\d+\.\d+\.\d+')
          cat > docs/badges/rust-version.svg <<BADGE_EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="170" height="20" role="img" aria-label="rust: ${VERSION}">
            <linearGradient id="a" x2="0" y2="100%"><stop offset="0" stop-opacity=".1" stop-color="#fff"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <rect rx="3" width="170" height="20" fill="#555"/>
            <rect rx="3" x="42" width="128" height="20" fill="#f28c28"/>
            <rect rx="3" width="170" height="20" fill="url(#a)"/>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
              <text x="21" y="14">rust</text>
              <text x="106" y="14">${VERSION}</text>
            </g>
          </svg>
          BADGE_EOF

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/badges/
          git diff --cached --quiet || echo "No badge changes to commit"

      - name: Push badge updates
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git commit -m "ci: update badges" || echo "Nothing to commit"
          git push

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release workspace
        run: cargo build --workspace --release
